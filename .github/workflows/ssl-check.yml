name: SSL & DNS Health Check
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ssl-dns-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SSL certificates and DNS
        run: |
          python3 << 'PYEOF'
          import ssl, socket, subprocess, json, datetime

          domains = [
              ("Website", "nelsoncollege.ac.uk"),
              ("Virtual Learning Environment VLE", "nclvle.co.uk"),
              ("Nelson One", "one.nelsoncollege.ac.uk"),
              ("Nelson Portal", "portal.nelsoncollege.ac.uk"),
              ("NCL Alumni Association", "alumni.nelsoncollege.ac.uk"),
              ("Help Centre", "nelsoncollege.atlassian.net"),
              ("Status Page", "status.nelsoncollege.ac.uk"),
          ]

          results = []
          for name, domain in domains:
              entry = {"name": name, "domain": domain, "ssl": {}, "dns": {}}

              try:
                  ctx = ssl.create_default_context()
                  with ctx.wrap_socket(socket.socket(), server_hostname=domain) as s:
                      s.settimeout(10)
                      s.connect((domain, 443))
                      cert = s.getpeercert()
                      expiry_str = cert["notAfter"]
                      expiry_dt = datetime.datetime.strptime(expiry_str, "%b %d %H:%M:%S %Y %Z")
                      days_left = (expiry_dt - datetime.datetime.utcnow()).days
                      issuer_dict = dict(x[0] for x in cert.get("issuer", ()))
                      issuer_o = issuer_dict.get("organizationName", issuer_dict.get("commonName", ""))
                      subject_dict = dict(x[0] for x in cert.get("subject", ()))
                      subject_cn = subject_dict.get("commonName", domain)
                      if days_left <= 0:
                          status = "expired"
                      elif days_left <= 7:
                          status = "critical"
                      elif days_left <= 30:
                          status = "warning"
                      else:
                          status = "valid"
                      entry["ssl"] = {
                          "status": status,
                          "expiry": expiry_dt.strftime("%Y-%m-%dT%H:%M:%SZ"),
                          "daysLeft": days_left,
                          "issuer": issuer_o,
                          "subject": subject_cn,
                      }
              except Exception as e:
                  entry["ssl"] = {"status": "error", "expiry": "", "daysLeft": 0, "issuer": "", "subject": str(e)}

              try:
                  result = subprocess.run(["dig", "+short", domain], capture_output=True, text=True, timeout=10)
                  records = result.stdout.strip().replace("\n", ", ")
                  entry["dns"] = {"status": "ok" if records else "fail", "records": records}
              except Exception:
                  entry["dns"] = {"status": "fail", "records": ""}

              results.append(entry)

          with open("api/ssl-status.json", "w") as f:
              json.dump(results, f, indent=2)

          print("SSL & DNS check complete")
          for r in results:
              print(f"  {r['name']}: SSL={r['ssl']['status']} ({r['ssl'].get('daysLeft',0)}d), DNS={r['dns']['status']}")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "Upptime Bot"
          git config user.email "upptime@koj.co"
          git add api/ssl-status.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m ":lock: Update SSL & DNS health check [skip ci]"
            git push
          fi
