status-website:
  cname: status.nelsoncollege.ac.uk
  logoUrl: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
  faviconSvg: https://raw.githubusercontent.com/travnettech/ncl_status/HEAD/assets/icon.svg
  name: NCL Status
  metaDescription: "Live service status and uptime monitoring for Nelson College London. Check real-time availability of the NCL website, VLE, Nelson One, Nelson Portal, Alumni Association, and Help Centre."
  metaImage: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
  introTitle: "**Welcome to the NCL Status Page**"
  introMessage: This page provides real-time status updates for all Nelson College London digital services, including the main website, Virtual Learning Environment (VLE), Nelson One, Nelson Portal, and the Alumni Association. You can also view details of scheduled maintenance and past incidents. If you require further assistance, please contact our [**Help Centre**](https://nelsoncollege.atlassian.net/servicedesk/customer/portals).
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://nelsoncollege.ac.uk
    - title: Help Centre
      href: https://nelsoncollege.atlassian.net/servicedesk/customer/portals
    - title: Turnitin Status
      href: https://turnitin.statuspage.io

i18n:
  activeIncidents: "Active Incidents"
  allSystemsOperational: "All Systems Operational"
  incidentReport: "Incident Report"
  activeIncidentSummary: "Opened $OPENED ago with $POSTS updates"
  degradedPerformance: "Degraded Performance"
  completeOutage: "Complete Outage"
  partialOutage: "Partial Outage"
  footer: "© 2026 Nelson College London. All Rights Reserved. Made with ❤️ by [Sitenet Tech](https://sitenet.tech/)."

