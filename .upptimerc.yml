owner: travnettech
repo: ncl_status

# Assign these GitHub users to incident issues automatically
assignees:
  - travnettech # Replace with actual GitHub usernames of your IT/ops team

sites:
  - name: Website
    url: https://nelsoncollege.ac.uk
    icon: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200
      - 301
    __dangerous__body_down_if_text_missing: "Nelson College"
  - name: Virtual Learning Environment VLE
    url: https://nclvle.co.uk
    icon: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/VLE_NCL.svg
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
      - 301
      - 302
    __dangerous__body_down_if_text_missing: "Nelson"
  - name: Nelson One
    url: https://one.nelsoncollege.ac.uk
    icon: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/One_NCL.svg
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200
      - 301
      - 302
    __dangerous__body_down_if_text_missing: "Nelson"
  - name: Nelson Portal
    url: https://portal.nelsoncollege.ac.uk
    icon: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200
      - 301
      - 302
    __dangerous__body_down_if_text_missing: "Nelson"
  - name: NCL Alumni Association
    url: https://alumni.nelsoncollege.ac.uk
    icon: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/Alumni_NCL.svg
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200
      - 301
    __dangerous__body_down_if_text_missing: "Nelson"
  - name: Help Centre
    url: https://nelsoncollege.atlassian.net/servicedesk/customer/portals
    icon: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
    maxResponseTime: 10000
    expectedStatusCodes:
      - 200
      - 301
      - 302
      - 303
  - name: Status Page
    url: https://status.nelsoncollege.ac.uk
    icon: https://raw.githubusercontent.com/travnettech/ncl_status/HEAD/status-site/assets/icon.svg
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200

status-website:
  # cname: status.nelsoncollege.ac.uk  # Disabled — custom frontend hosted on Cloudflare Pages
  baseUrl: /ncl_status
  logoUrl: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
  faviconSvg: https://raw.githubusercontent.com/travnettech/ncl_status/HEAD/assets/icon.svg
  name: NCL Status
  css: |
    nav a { margin: 0 0.1rem; }
    footer { font-size: 0.75rem; }
    footer a { text-decoration: none; }
  metaDescription: "Live service status and uptime monitoring for Nelson College London. Check real-time availability of the NCL website, VLE, Nelson One, Nelson Portal, Alumni Association, and Help Centre."
  metaImage: https://portal-nelsoncollege-files.s3.eu-west-2.amazonaws.com/logo/NCL_logo.svg
  introTitle: "**Welcome to the NCL Status Page**"
  introMessage: This page provides real-time status updates for all Nelson College London digital services, including the main website, Virtual Learning Environment (VLE), Nelson One, Nelson Portal, and the Alumni Association. You can also view details of scheduled maintenance and past incidents. If you require further assistance, please contact our [**Help Centre**](https://nelsoncollege.atlassian.net/servicedesk/customer/portals).
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://nelsoncollege.ac.uk
    - title: Turnitin Status
      href: https://turnitin.statuspage.io

i18n:
  activeIncidents: "Active Incidents"
  allSystemsOperational: "All Systems Operational"
  incidentReport: "Incident Report"
  activeIncidentSummary: "Opened $OPENED ago with $POSTS updates"
  degradedPerformance: "Degraded Performance"
  completeOutage: "Complete Outage"
  partialOutage: "Partial Outage"
  footer: "© 2026 Nelson College London. All Rights Reserved. Made with ❤️ by [Sitenet Tech](https://sitenet.tech/)."

